<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>EventCueFlow</title>

  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body class="center-page">

  <div class="card">
    <h1 class="title">EventCueFlow</h1>
    <p class="subtitle">Real-Time Event Cue Management System</p>

    <label>ชื่อผู้ใช้</label>
    <input type="text" id="username" placeholder="กรอกชื่อผู้ใช้" />

    <label>เลือกสิทธิ์การใช้งาน</label>
    <select id="role">
      <option value="editor">Editor (แก้ไขได้)</option>
      <option value="viewer">Viewer (ดูอย่างเดียว)</option>
    </select>

    <button id="loginBtn" class="btn login-btn">
  <img src="images/icons/login.png" class="icon">
  Login
</button>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById("loginBtn").addEventListener("click", function () {
      const username = document.getElementById("username").value.trim();
      const role = document.getElementById("role").value;

      if (username === "") {
        alert("กรุณากรอกชื่อผู้ใช้");
        return;
      }

      localStorage.setItem("username", username);
      localStorage.setItem("role", role);

      window.location.href = "dashboard.html";
    });
  </script>
</body>
</html>
